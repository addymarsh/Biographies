<!DOCTYPE html> 
<html> 
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biographies</title>
    <link href="new.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Rubik+Bubbles&display=swap" rel="stylesheet">
</head>
<body>
    <div class="head"> 
        <div class="back">back</div>
    </div>

    <div class="details">
        <div class="name">
            <textarea name="name" placeholder="Name"></textarea>
        </div>
        <div class="age">
            <textarea name="age" placeholder="Age"></textarea>
        </div>
        <div class="height">
            <textarea name="height" placeholder="Height"></textarea>
        </div>
        <div class="home">
            <textarea name="hometown" placeholder="Hometown"></textarea>
        </div>
        <div class="birth">
            <textarea name="birthday" placeholder="Birthday"></textarea>
        </div>
        <div class="met">
            <textarea name="met" placeholder="When you met"></textarea>
        </div>
        <div class="phone">
            <textarea name="phone" placeholder="Phone #"></textarea>
        </div>
        <div class="address">
            <textarea name="address" placeholder="Address"></textarea>
        </div>
        <div class="job">
            <textarea name="occupation" placeholder="Occupation"></textarea>
        </div>
        <div class="desc">
            <textarea name="description" placeholder="Description"></textarea>
        </div>
        <div class="col">
            <textarea name="color" placeholder="Favorite color"></textarea>
        </div>
        <div class="food">
            <textarea name="food" placeholder="Favorite food"></textarea>
        </div>
        <div class="hobbies">
            <textarea name="hobbies" placeholder="Hobbies"></textarea>
        </div>
        <div class="book">
            <textarea name="book" placeholder="Favorite book"></textarea>
        </div>
        <div class="movie">
            <textarea name="movie" placeholder="Favorite movie"></textarea>
        </div>
        <div class="show">
            <textarea name="show" placeholder="Favorite T.V. show"></textarea>
        </div>
        <div class="music">
            <textarea name="music" placeholder="Favorite musician"></textarea>
        </div>
        <div class="goals">
            <textarea name="goals" placeholder="Goals"></textarea>
        </div>
        <div class="fears">
            <textarea name="fears" placeholder="Worst fears"></textarea>
        </div>
        <div class="notes">
            <textarea name="notes" placeholder="Other notes"></textarea>
        </div>
    </div>



</body>
</html>
