<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biographies</title>
    <link href="fonts.css" rel="stylesheet">
    <link href="face-layers.css" rel="stylesheet">
    <link href="new.css" rel="stylesheet">
</head>
<body>
    <div class="head">
        <a href="index.html" class="back">back</a>
        <button type="button" class="save">save</button>
    </div>

    <div class="details">
        <div class="details-main">
            <div class="details-col details-col--left">
                <div class="chara">
                    <a class="chara-inner chara-customize-link" href="customize.html">
                        <div class="chara-face">
                            <div class="face-stack face-stack--thumb">
                                <img data-part="cheeks" alt="" hidden>
                                <img data-part="eyes" alt="" hidden>
                                <img data-part="nose" alt="" hidden>
                                <img data-part="mouth" alt="" hidden>
                            </div>
                        </div>
                        <span class="chara-hint">What do they <br>look like?</span>
                    </a>
                </div>
                <div class="home">
                    <textarea name="hometown" placeholder="Hometown"></textarea>
                </div>
                <div class="birth">
                    <textarea name="birthday" placeholder="Birthday"></textarea>
                </div>
                <div class="met">
                    <textarea name="met" placeholder="When you met"></textarea>
                </div>
                <div class="phone">
                    <textarea name="phone" placeholder="Phone #"></textarea>
                </div>
                <div class="address">
                    <textarea name="address" placeholder="Address"></textarea>
                </div>
                <div class="job">
                    <textarea name="occupation" placeholder="Occupation"></textarea>
                </div>
                <div class="desc">
                    <textarea name="description" placeholder="Three words to describe them" rows="2"></textarea>
                </div>
                <div class="col">
                    <textarea name="color" placeholder="Favorite color"></textarea>
                </div>
                <div class="food">
                    <textarea name="food" placeholder="Favorite food"></textarea>
                </div>
            </div>

            <div class="details-col details-col--right">
                <div class="name">
                    <textarea name="name" placeholder="Name"></textarea>
                </div>
                <div class="age-height">
                    <div class="age">
                        <textarea name="age" placeholder="Age"></textarea>
                    </div>
                    <div class="height">
                        <textarea name="height" placeholder="Height"></textarea>
                    </div>
                </div>
                <div class="movie">
                    <textarea name="movie" placeholder="Favorite movie"></textarea>
                </div>
                <div class="show">
                    <textarea name="show" placeholder="Favorite T.V. show" rows="2"></textarea>
                </div>
                <div class="music">
                    <textarea name="music" placeholder="Favorite musician" rows="2"></textarea>
                </div>
                <div class="goals">
                    <textarea name="goals" placeholder="Goals"></textarea>
                </div>
                <div class="fears">
                    <textarea name="fears" placeholder="Worst fears"></textarea>
                </div>
                <div class="notes">
                    <textarea name="notes" placeholder="Other notes"></textarea>
                </div>
                <div class="hobbies">
                    <textarea name="hobbies" placeholder="Hobbies"></textarea>
                </div>
                <div class="book">
                    <textarea name="book" placeholder="Favorite book"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="face-assets.js"></script>
    <script src="buddies-storage.js"></script>
    <script src="new-buddy.js"></script>
</body>
</html>
