<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biographies</title>
    <link href="style.css" rel="stylesheet">
    <link href="face-layers.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Rubik+Bubbles&display=swap" rel="stylesheet">
</head>
<body>
    <div class="splash" id="splash" aria-hidden="true">
        <div class="splash-figure" aria-hidden="true">
            <div class="splash-bot"></div>
            <div class="splash-arm"></div>
        </div>
    </div>
    <div class="head">
        BUDDIES!
    </div>
    <div class="buddy-grid" id="buddy-grid" aria-live="polite"></div>

    <script src="face-assets.js"></script>
    <script src="buddies-storage.js"></script>
    <script src="index-buddies.js"></script>
    <script>
    (function () {
        var splash = document.getElementById("splash");
        if (!splash) return;
        function dismiss() {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
        }
        splash.addEventListener("animationend", dismiss, { once: true });
        setTimeout(dismiss, 1200);
    })();
    </script>
</body>
</html>
